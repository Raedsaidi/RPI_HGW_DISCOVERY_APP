server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Health check endpoint ──
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy auth-service (port 8000) ──
    location /api/v1/auth/ {
        proxy_pass         http://auth-service:8000/api/v1/auth/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy discovery-service (port 8001) + WebSocket support ──
    location /api/v1/ {
        proxy_pass         http://discovery-service:8001/api/v1/;
        proxy_http_version 1.1;

        # ✅ WebSocket headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ✅ Keep WS alive (terminal)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # ✅ Avoid buffering WS frames
        proxy_buffering off;
    }

    # ── Static assets — long cache ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback — all routes → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}